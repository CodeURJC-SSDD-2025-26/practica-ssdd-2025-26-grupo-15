services:
  db:
    image: mysql:9.6
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

  pdf:
    image: pruizz/dsgram-pdf-service-app:latest
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy

  web:
    image: pruizz/dsgram-app-service-app:latest
    ports:
      - 8443:8443
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db/${DB_NAME:-test}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - KEYSTORE_SECRET=${KEYSTORE_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${DB_CONFIG:-none}
      - PDF_SERVICE_URL=http://pdf:8080
    depends_on:
      db:
        condition: service_healthy
      pdf:
        condition: service_started

volumes:
  db_data: